name: Deploy to GitHub Pages

on:
  # Trigger the workflow every time you push to the `main` branch
  # Using a different branch name? Replace `main` with your branch’s name
  push:
    branches: [ main ]
  # Allows you to run this workflow manually from the Actions tab on GitHub.
  workflow_dispatch:

# Allow this job to clone the repo and create a page deployment
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    env:
      PUBLIC_CERT_SALT: ${{ secrets.PUBLIC_CERT_SALT || vars.PUBLIC_CERT_SALT }}
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4
      - name: Verify certificate salt is configured
        run: |
          if [ -z "$PUBLIC_CERT_SALT" ]; then
            echo "::error::PUBLIC_CERT_SALT is empty. Add it in GitHub under Settings → Secrets and variables → Actions, named exactly PUBLIC_CERT_SALT, as a Repository secret/variable or as a secret/variable on the github-pages environment."
            exit 1
          fi
      - name: Install, build, and upload your site
        uses: withastro/action@v3
        with:
          node-version: 22 # Astro 6 requires Node.js >=22.12.0
          # pnpm is auto-detected from pnpm-lock.yaml; version comes from package.json "packageManager"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
